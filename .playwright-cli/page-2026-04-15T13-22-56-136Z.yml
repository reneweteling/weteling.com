              - paragraph [ref=e78]: Starting with Rails, ive noticed that the migrations dont create foreign keys in a InnoDB setting voor MySql. So i did some research.
              - paragraph [ref=e79]: For some reason Rails doesnt pay to much attention to the foreign keys, this because ActiveRecord is an excelent ORM and doens't need to be monitored by constraints in the DB itself. That being said.... i want it.
              - paragraph [ref=e80]: So i found a nice litte gem that fixes this for you.
              - paragraph [ref=e81]: Take a look!
