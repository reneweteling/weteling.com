  - generic [ref=e270]:
    - heading "Over mij" [level=2] [ref=e271]
    - generic [ref=e272]:
      - generic [ref=e273]:
        - text: Ik ben een programmeur uit Capelle aan den IJssel, net onder de rok van Rotterdam. Al van jongs af aan was ik verliefd op computers.
        - text: Mijn vader leerde me batch scripts in MS-DOS toen ik een jaar of 9 was, op een 286DX met de turbo altijd aan. We waren een van de eersten in de buurt met een inbelverbinding — daarna ISDN, DSL, kabel en uiteindelijk glasvezel. De mogelijkheden om die machines met elkaar te verbinden waren zo gaaf dat ik op mijn 14e al experimenteerde met VPN's, LAMP-stacks en FTP-servers.
      - generic [ref=e274]:
        - generic [ref=e275]: Een richting kiezen voor mijn studie was een van de makkelijkste keuzes uit mijn leven. Informatica aan de HRO in Rotterdam, parttime naast mijn werk bij een digitaal bureau. De code monkey was geboren!
        - img [ref=e277]
        - generic [ref=e278]: Privé ben ik een trotse vader van 3 kinderen. Verloofd met de liefde van mijn leven. Festivalliefhebber, borrelen met vrienden, varen door de grachten en natuurlijk op pad met de sleurhut.
