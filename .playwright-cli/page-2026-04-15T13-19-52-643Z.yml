  - generic [ref=e270]:
    - heading "About me" [level=2] [ref=e271]
    - generic [ref=e272]:
      - generic [ref=e273]:
        - text: I'm a coder born in Capelle aan den IJssel, just outside of Rotterdam (NL). At a very young age, I fell in love with computers.
        - text: My dad was also pretty interested in computers and taught me batch scripts in MS-DOS when I was about 9 years old, on a 286DX with the turbo always on. We were one of the first in the neighborhood with a dial-up connection, followed by ISDN with trunk mode, followed by DSL, Cable, and finally Fiber. The possibilities of connecting these machines to each other were so intriguing that I started experimenting with VPNs, LAMP stacks, and FTP servers at the age of 14.
      - generic [ref=e274]:
        - generic [ref=e275]: Time to choose a direction for my future education, one of the simplest choices of my life, so I enrolled in Computer Sciences at the HRO in Rotterdam. The education was a breeze, and I did it part-time while working at a digital agency. The code monkey was born!
        - img [ref=e277]
        - generic [ref=e278]: On a personal note, I'm a proud father of 3 kids. Engaged to my beautiful wife-to-be. Festival lover, hanging out with friends, boating in the canals, and of course vacation. Work hard, play hard!
