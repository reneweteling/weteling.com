              - paragraph [ref=e199]: "- **Name** René Weteling - **Home address** Johannes Geradtsweg 47, 1222PM Hilversum - **Phone number** [+316 (0) 55 128 199](tel:0031655128199) - **Portfolio** [www.weteling.com](https://www.weteling.com) - **E-mail address** [rene@weteling.com](mailto:rene@weteling.com \"rene@weteling.com\") - **Date of birth** 04-12-1986 - **Birthplace & nationality** Capelle a/d IJssel, Dutch"
              - heading "About me" [level=3] [ref=e200]
              - paragraph [ref=e201]: Tech has always been my passion, tracing back to my earliest memories of tinkering with gadgets and diving into computers. This enthusiasm drove me to pursue a bachelor's degree in IT sciences, which laid a strong foundation for my professional journey.
              - paragraph [ref=e202]: My career began at a design agency, where I collaborated with companies of various sizes, gaining diverse experience. Transitioning to freelance work allowed me to deliver optimal value to my clients, a role that invigorates and fulfills me.
              - paragraph [ref=e203]: I excel in building greenfield applications efficiently, from selecting the best development techniques to architecting the target infrastructure. By prioritizing automation, I ensure a seamless coding experience, leading to better project outcomes. Happy developers produce superior code quality.
              - paragraph [ref=e204]: I thrive on sharing my expertise with teams and organizations, enjoying their growth and success. Colleagues often describe me as a sociable hard worker with a keen sense of humor and a results-oriented mindset.
