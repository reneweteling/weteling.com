              - paragraph [ref=e81]:
                - emphasis [ref=e82]: Freelance | Tech lead | Fractional CTO | Problem solver | Full-Stack development
              - paragraph [ref=e83]: "- **Naam** René Weteling - **Adres** Johannes Geradtsweg 47, 1222PM Hilversum - **Telefoonnummer** [+316 (0) 55 128 199](tel:0031655128199) - **Portfolio** [www.weteling.com](https://www.weteling.com) - **E-mailadres** [rene@weteling.com](mailto:rene@weteling.com \"rene@weteling.com\") - **Geboortedatum** 04-12-1986 - **Geboorteplaats** Capelle a/d IJssel - **Nationaliteit** Nederlands"
              - heading "Over mij" [level=3] [ref=e84]
              - paragraph [ref=e85]: Van jongs af aan ben ik altijd geïnteresseerd geweest in computers, scripting en automatiseren. Dit begon toen ik klein was met het maken van menu's in MS-Dos, gevolgd door zakgeldberekeningen in Works Sheets, en later het bouwen van een digitaal roostersysteem voor de pizzeria waar ik werkte toen ik 16 was. Logischerwijs heb ik dit pad voortgezet en ben informatica gaan studeren, waarna ik bij een design agency terechtkwam.
              - paragraph [ref=e86]: "Het leuke aan het werken bij een design agency is dat je projectmatig werkt en met veel verschillende aspecten van IT in aanraking komt. Dit voedt mijn brede interesse: van teamdynamiek en programmeren tot devops en advies; ik doe het allemaal graag."
              - paragraph [ref=e87]: Maar de echte sprong in mijn ontwikkeling kwam toen ik ben gaan freelancen. De verantwoordelijkheid die je voelt voor een project zorgt ervoor dat je scherp bent en wilt presteren. En deze mindset is uniform voor freelancers, je pusht elkaar echt naar een hoger niveau.
              - heading "Vaardigheden & Kennis" [level=3] [ref=e88]
              - paragraph [ref=e89]: Hier heb ik mijn meest prominente vaardigheden uitgeschreven.
