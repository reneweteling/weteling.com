      hero:
        title: "Home"
        hi: "Hoi"
        im_rene: "Ik ben René"
        allround_developer: "Allround Developer"
        say_hello: "Zeg hallo"

      services:
        title: "Diensten"
        subtitle: "Software bouwen is complex. Ik help je er doorheen."
        caas:
          h3: "CTO as a Service"
          service-description: "Technisch leiderschap nodig zonder een fulltime CTO? Ik overburg de kloof tussen bedrijfsdoelen en technologie, en begeleid je team bij architectuurkeuzes, vendor selectie en technische strategie."
        duck:
          h3: "Sparringpartner"
          service-description: "Soms heb je gewoon een senior engineer nodig om mee te sparren. Onder het genot van een bakkie koffie bespreken we je architectuur, tech-keuzes en uitdagingen. Vrijblijvend."
        broker:
          h3: "IT Aankoopmakelaar"
          service-description: "Een bedrijf inhuren om je product te bouwen maar geen technische kennis in huis? Ik let op vendor lock-ins, verouderde technieken en te dure contracten — als een makelaar voor je IT-investeringen."
        ai:
          h3: "AI Integratie"
          service-description: "Van AI-tools voor developers tot het integreren van LLM's in je product — ik help teams om AI effectief in te zetten. Of het nu gaat om developer productiviteit of klantgerichte AI-features, ik doe het hands-on."

      skills:
        title: "Vaardigheden"
        subtitle: "Door de jaren heen ben ik in contact gekomen met <strong>meerdere</strong> facetten van het IT-landschap. Mijn <strong>passie</strong> ligt bij webontwikkeling, omdat de korte iteratiecyclus het mogelijk maakt om het product te optimaliseren en data-gedreven beslissingen te nemen. Ik hou ervan wanneer mensen het product gebruiken dat ik heb helpen ontwikkelen, dus web en mobiel zijn ideaal!"
        be:
          title: "Back-End Ontwikkeling"
          description: "Net zoals in het leven gebeuren de meeste interessante dingen achter de schermen. API's, integraties, back-ends, services, jobs, search, storage, noem maar op. Dit is waar ik me thuis voel."
          tags:
            - title: "Talen:"
              items:
                - "Elixir"
                - "Ruby"
                - "NodeJs"
                - "TypeScript"
                - "PHP"
                - "Perl"
                - "SQL"
                - "GraphQL"
            - title: "Development tools:"
              items:
                - "VsCode"
                - "GitHub"
                - "GitLab"
                - "BitBucket"
                - "Jira"
                - "SourceTree"
                - "DBeaver"
            - title: "Frameworks:"
              items:
                - "Phoenix"
                - "Rails"
                - "Express"
                - "Laravel"
                - "VueJs"
                - "Pinia"
        fe:
          title: "Front-End Ontwikkeling"
          description: "Frontends bouwen is een vak apart. Het is niet alleen het visuele aspect, maar ook de interactie met de gebruiker, de snelheid van de applicatie, de toegankelijkheid en de SEO. Dit is waar ik me graag mee bezig houd."
          tags:
            - title: "Talen:"
              items:
                - "Html"
                - "Css"
                - "Sass"
                - "Javascript"
                - "Typescript"
                - "Slim"
                - "Haml"
            - title: "Development tools:"
              items:
                - "Vite"
                - "Webpack"
                - "Rollup"
                - "Gulp"
                - "Figma"
                - "Zeplin"
            - title: "Frameworks:"
              items:
                - "VueJS"
                - "React"
                - "Tailwind"
                - "Bootstrap"

        devops:
          title: DevOps
          description: "Het is niet alleen het bouwen van een applicatie, maar ook het in de lucht houden ervan. Dit is waar DevOps om de hoek komt kijken. Het automatiseren van processen, het schalen van applicaties, het monitoren van applicaties, het beveiligen van applicaties."
          tags:
            - title: "Services:"
              items:
                - "Github Actions"
                - "CircleCi"
                - "CodePipelines"
                - "AWS"
                - "Azure"
                - "Google Cloud"
                - "DockerHub"
                - "Dokku"
                - "Heroku"
                - "Flynn"
                - "Hetzner"
                - "DigitalOcean"
                - "Cloud66"
            - title: "Development tools:"
              items:
                - "Terraform"
                - "Ansible"
                - "Capistrano"

      recruiters:
        title: "Recruitment"
        subtitle: "<strong>Dit is de informatie waar je op hebt gewacht!</strong><br /><br />Mijn CV is hier beschikbaar:"
        keep_in_loop: "Wil je op de hoogte gehouden worden wanneer ik beschikbaar ben voor nieuwe projecten? Laat dan hier je contactgegevens achter:"
      projects:
        title: "Projecten"
        subtitle: "Een selectie van projecten waar ik aan heb gewerkt in mijn carrière."
        about_company: "Over het bedrijf:"
        my_role: "Mijn rol:"
        techniques: "Gebruikte technieken:"
        view_project: "Bekijk details"
        show_more: "Toon alle projecten"
        show_less: "Toon minder"
      about_me:
        title: "Over mij"
        intro1: "Ik ben een programmeur geboren in Capelle aan den IJssel, net onder de rok van Rotterdam (NL). Op zeer jonge leeftijd werd ik verliefd op computers. <br/> <br />Mijn vader was ook behoorlijk geïnteresseerd in computers en leerde me batch scripts in MS-DOS toen ik ongeveer 9 jaar oud was, op een 286DX met de turbo altijd aan. We waren een van de eersten in de buurt met een inbelverbinding, gevolgd door ISDN met trunk-modus, gevolgd door DSL, kabel en uiteindelijk glasvezel. De mogelijkheden om deze machines met elkaar te verbinden waren zo intrigerend dat ik op 14-jarige leeftijd begon te experimenteren met VPN's, LAMP-stacks en FTP-servers."
        intro2: "Tijd om een richting voor mijn toekomstige opleiding te kiezen, een van de eenvoudigste keuzes van mijn leven, dus ik schreef me in voor Informatica aan de HRO in Rotterdam. De opleiding was een eitje, en ik deed het parttime terwijl ik werkte bij een digitaal bureau."
        intro3: "Op persoonlijk vlak ben ik een trotse vader van 3 kinderen. Verloofd met de liefde van mijn leven. Festivalliefhebber, borrelen met vrienden, varen in de grachten en natuurlijk met de sleurhut op pad."
      contact:
        title: "Contact"
        subtitle: "Je kunt de onderstaande gegevens gebruiken, of een e-mail sturen via het contactformulier."

    project:
