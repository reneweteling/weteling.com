                - "Tailwind"
                - "Bootstrap"

        devops:
          title: DevOps
          description: "Applicaties bouwen is één ding, ze draaiende houden is een vak apart. Automatiseren, schalen, monitoren, beveiligen — daar komt DevOps om de hoek kijken, en dat is precies wat ik graag opzet."
