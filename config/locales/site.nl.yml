      services:
        title: "Diensten"
        subtitle: "Software bouwen is complex. Ik help je erdoorheen."
        caas:
          h3: "CTO as a Service"
          service-description: "Technisch leiderschap nodig zonder een fulltime CTO aan te nemen? Ik overbrug de kloof tussen bedrijfsdoelen en technologie — van architectuurkeuzes en vendor selectie tot technische strategie."
        duck:
          h3: "Sparringpartner"
          service-description: "Soms heb je gewoon een senior engineer nodig om mee te sparren. Met een bakkie koffie bespreken we je architectuur, tech-keuzes en uitdagingen. Vrijblijvend."
        agentic:
          h3: "Agentic Engineer"
          service-description: "Een compleet MVP in recordtijd. Ik werk met agentic teams van AI-agents die parallel bouwen, testen en reviewen, aangestuurd door mijn engineering-ervaring. Zo zet je in dagen neer waar normaal weken voor staan, zonder in te leveren op kwaliteit."
        ai:
          h3: "AI Integratie"
          service-description: "Van AI-tools voor developers tot het integreren van LLM's in je product — ik help teams om AI effectief in te zetten. Developer productiviteit of klantgerichte features, ik pak het hands-on aan."

      skills:
        title: "Vaardigheden"
        subtitle: "In de loop der jaren heb ik met <strong>veel</strong> facetten van het IT-landschap gewerkt. Mijn <strong>passie</strong> ligt bij webontwikkeling — korte iteraties, data-gedreven keuzes, en het gevoel wanneer mensen daadwerkelijk het product gebruiken dat je hebt gebouwd. Web en mobiel zijn daarvoor ideaal!"
        be:
          title: "Back-End Ontwikkeling"
          description: "Net zoals in het leven gebeuren de meeste interessante dingen achter de schermen. API's, integraties, back-ends, services, jobs, search, storage, noem maar op. Dit is waar ik me thuis voel."
          tags:
            - title: "Talen:"
