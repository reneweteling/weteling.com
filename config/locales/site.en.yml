        subtitle: "Throughout the years, I've worked with <strong>multiple</strong> facets of the IT landscape. My <strong>passion</strong> is in web development, because of the short iteration cycles to optimize the product and the ability to make data-driven decisions. I love it when people use the product that I've helped to develop, so web and mobile are ideal! Back-end, front-end and infra from one hand, that's how I deliver a project end to end."
