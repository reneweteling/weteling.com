          service-description: "You bring the idea and the design, I deliver the rest. Architecture, back-end, front-end, infra and deployment, all from one hand. Solo for the whole project, or as senior reinforcement bringing that knowledge into your existing team."
        caas:
          h3: "CTO as a Service"
          service-description: "Need technical leadership without the full-time hire? I bridge the gap between business goals and technology, guiding your team through architecture decisions, vendor selection, and technical strategy."
