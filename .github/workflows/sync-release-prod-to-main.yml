name: Sync release/prod to main

on:
  push:
    branches:
      - release/prod

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check if PR already exists
        id: check-pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:release/prod`,
              base: 'main',
              state: 'open'
            });

            if (prs.length > 0) {
              console.log(`PR #${prs[0].number} already exists: ${prs[0].html_url}`);
              core.setOutput('pr_exists', 'true');
              core.setOutput('pr_number', prs[0].number.toString());
            } else {
              console.log('No existing PR found. Will create a new one.');
              core.setOutput('pr_exists', 'false');
            }

      - name: Create Pull Request
        if: steps.check-pr.outputs.pr_exists == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Sync release/prod to main',
              head: 'release/prod',
              base: 'main',
              body: `This PR automatically syncs changes from \`release/prod\` to \`main\` to ensure hotfixes are applied to the main branch.
              
              **Triggered by:** Commit ${context.sha.substring(0, 7)} on \`release/prod\`
              **Created by:** GitHub Actions
              
              Please review and merge when ready.`,
              maintainer_can_modify: true
            });

            console.log(`Created PR #${pr.number}: ${pr.html_url}`);

            // Optionally add labels
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['automated', 'sync']
              });
            } catch (error) {
              console.log('Could not add labels (they may not exist):', error.message);
            }
